site_name: monocle3-python
use_directory_urls: false
theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: numpy
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
  - mkdocs-jupyter:
      include_source: true

nav:
  - Home: index.md
  - API Reference: api.md
  - Tutorials:
      - C. elegans embryo: tutorials/c_elegans_embryo_v2.ipynb
      - C. elegans L2: tutorials/c_elegans_L2_v2.ipynb
